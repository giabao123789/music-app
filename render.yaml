# Render Blueprint — deploy cả API + Frontend
# Docs: https://render.com/docs/blueprint-spec

services:
  # ── Backend (NestJS) ──────────────────────────────────────
  - type: web
    name: music-api
    runtime: docker
    rootDir: api
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        fromService:
          type: web
          name: music-web
          envVarKey: RENDER_EXTERNAL_URL
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        value: Music App

  # ── Frontend (Next.js) ────────────────────────────────────
  - type: web
    name: music-web
    runtime: node
    rootDir: web
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: BACKEND_URL
        fromService:
          type: web
          name: music-api
          envVarKey: RENDER_EXTERNAL_URL
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: music-api
          envVarKey: RENDER_EXTERNAL_URL
      - key: NEXTAUTH_URL
        fromService:
          type: web
          name: music-web
          envVarKey: RENDER_EXTERNAL_URL
      - key: NEXTAUTH_SECRET
        generateValue: true
